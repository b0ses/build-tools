name: Deploy via Ansible

on:
  workflow_dispatch: # Allows manual execution from the GitHub UI
    inputs:
      project:
        description: 'Select which project to deploy'
        required: true
        type: choice
        options:
          - custom-stream-overlay
          - diction-practice
      rebuild_db:
        description: 'Rebuild the database'
        required: false
        type: boolean
        default: false
      DOMAIN_NAME:
        description: 'Select which project to deploy'
        required: true
        type: choice
        options:
          - cstream-tools.app
          - dictionpractice.com
      LOGIN_REQUIRED:
        description: 'Whether to enforce logging in or not'
        required: false
        type: boolean
        default: false       
      CUTOFF:
        description: 'How long to keep the sound on (0 for always on)'
        required: false
        type: string
        default: '0'
      HUE_GROUP_NUMBER:
        description: 'The group number for the hue lights'
        required: false
        type: string
        default: '1'
      build_overlay:
        required: false
        type: boolean
        default: true
      build_api:
        required: false
        type: boolean
        default: true
      build_dashboard:
        required: false
        type: boolean
        default: true
      DISCORD_CHANNEL:
        required: false
        type: string
        default: 'general'
      TIMER_TZ:
        required: false
        type: string
        default: 'US/Eastern'

jobs:
  ansible-execution:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Extract code from repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up isolated environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install core infrastructure tools
      - name: Install Ansible and Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core ansible-runner

      # Step 4: Inject private SSH keys securely
      - name: Configure SSH Authentication
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ANSIBLE_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "ANSIBLE_HOST_KEY_CHECKING=False" >> $GITHUB_ENV

      # Step 5: Create inventory file from secrets
      - name: Put secrets in env
        run: |
          echo "DO_API_KEY=${{ secrets.do-api-token }}" >> $GITHUB_ENV
          echo "LETSENCRYPT_EMAIL=${{ secrets.letsencrypt-email }}" >> $GITHUB_ENV
          echo "SECRET_KEY=${{ secrets.flask-secret-key }}" >> $GITHUB_ENV
          echo "DB_URI=${{ secrets.db-uri }}" >> $GITHUB_ENV
          echo "CHANNEL=${{ secrets.channel }}" >> $GITHUB_ENV
          echo "TWITCH_CLIENT_ID=${{ secrets.twitch-client-id }}" >> $GITHUB_ENV
          echo "TWITCH_CLIENT_SECRET=${{ secrets.twitch-client-secret }}" >> $GITHUB_ENV
          echo "CHAT_CLIENT_ID=${{ secrets.twitch-client-id }}" >> $GITHUB_ENV
          echo "CHAT_TOKEN=${{ secrets.chat-token }}" >> $GITHUB_ENV
          echo "CHAT_USERNAME=${{ secrets.chat-username }}" >> $GITHUB_ENV
          echo "DISCORD_TOKEN=${{ secrets.discord-token }}" >> $GITHUB_ENV
          echo "HUE_APP_NAME=${{ secrets.hue-app-name }}" >> $GITHUB_ENV
          echo "HUE_CLIENT_ID=${{ secrets.hue-client-id }}" >> $GITHUB_ENV
          echo "HUE_CLIENT_SECRET=${{ secrets.hue-client-secret }}" >> $GITHUB_ENV

      # Step 6: Execute your automated playbook or notebook script
      - name: Run Ansible Process
        run: |
          ansible-playbook -i inventory.ini custom-stream-overlay.yml

      # Step 7: Cleanup
      - name: Cleanup Sensitive Files
        if: always()
        run: |
          rm -f inventory.ini ~/.ssh/id_rsa
