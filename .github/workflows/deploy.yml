name: Deploy via Ansible

on:
  workflow_dispatch: # Allows manual execution from the GitHub UI
    inputs:
      project:
        description: 'Select which project to deploy'
        required: true
        type: choice
        options:
          - custom-stream-overlay
          - diction-practice
      DOMAIN_NAME:
        description: 'Select which project to deploy'
        required: true
        type: choice
        options:
          - stream-tools.app
          - dictionpractice.com
      build_overlay:
        required: false
        type: boolean
        default: true
      build_api:
        required: false
        type: boolean
        default: true
      build_dashboard:
        required: false
        type: boolean
        default: true
      rebuild_db:
        description: 'Rebuild the database'
        required: false
        type: boolean
        default: false
      LOGIN_REQUIRED:
        description: 'Whether to enforce logging in or not'
        required: false
        type: boolean
        default: false
      CUTOFF:
        description: 'How long to keep the sound on (0 for always on)'
        required: false
        type: string
        default: '0'
      DISCORD_CHANNEL:
        required: false
        type: string
        default: 'general'
      HUE_GROUP_NUMBER:
        description: 'The group number for the hue lights'
        required: false
        type: string
        default: '1'
      TIMER_TZ:
        required: false
        type: string
        default: 'US/Eastern'

jobs:
  deploy-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible and Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core ansible-runner pydo boto3 requests

      - name: Install ansible plugins
        run: |
          ansible-galaxy collection install digitalocean.cloud ansible.posix community.general

#      - name: Setup SSH Key Agent
#        uses: webfactory/ssh-agent@v0.9.0
#        with:
#          ssh-private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Set up SSH Agent with Passphrase
        env:
          SSH_KEY: ${{ secrets.ADMIN_PRIVATE_KEY }}
          SSH_PASSPHRASE: ${{ secrets.ADMIN_PASSPHRASE }}
        run: |
          # Start the SSH agent in the background
          eval $(ssh-agent -s)

          # Create a helper script to securely supply the passphrase to ssh-add
          echo -e '#!/bin/sh\necho "$SSH_PASSPHRASE"' > ~/.ssh_askpass
          chmod +x ~/.ssh_askpass

          # Make the private key file with proper restricted permissions
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Use SSH_ASKPASS to load the passphrase-protected key silently
          export DISPLAY=:0
          export SSH_ASKPASS=~/.ssh_askpass
          setsid ssh-add ~/.ssh/id_ed25519 < /dev/null

          # Clean up the askpass script immediately for security
          rm ~/.ssh_askpass

          # Save agent environment variables for use in subsequent steps
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV

      - name: Run Ansible Process
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"

          project: "{{ inputs.project }}"
          DOMAIN_NAME: "{{ inputs.DOMAIN_NAME }}"
          build_overlay: "{{ inputs.build_overlay }}"
          build_api: "{{ inputs.build_api }}"
          build_dashboard: "{{ inputs.build_dashboard }}"
          rebuild_db: "{{ inputs.rebuild_db }}"
          LOGIN_REQUIRED: "{{ inputs.LOGIN_REQUIRED }}"
          CUTOFF: "{{ inputs.CUTOFF }}"
          DISCORD_CHANNEL: "{{ inputs.DISCORD_CHANNEL }}"
          HUE_GROUP_NUMBER: "{{ inputs.HUE_GROUP_NUMBER }}"
          TIMER_TZ: "{{ inputs.TIMER_TZ }}"

          ADMIN_PUB_KEY: "{{ vars.ADMIN_PUB_KEY }}"
          DIGITALOCEAN_TOKEN: "{{ secrets.DO_API_KEY }}"
          DO_API_KEY: "{{ secrets.DO_API_KEY }}"
          LETSENCRYPT_EMAIL: "{{ vars.LETSENCRYPT_EMAIL }}"
          SECRET_KEY: "{{ secrets.FLASK_SECRET }}"
          DB_URI: "{{ secrets.DB_URI }}"
          CHANNEL: "{{ vars.TWITCH_CHANNEL }}"
          TWITCH_CLIENT_ID: "{{ vars.TWITCH_CLIENT_ID }}"
          TWITCH_CLIENT_SECRET: "{{ secrets.TWITCH_CLIENT_SECRET }}"
          CHAT_CLIENT_ID: "{{ vars.CHAT_CLIENT_ID }}"
          CHAT_TOKEN: ''
          CHAT_USERNAME: "{{ vars.TWITCH_CHAT_USERNAME }}"
          DISCORD_TOKEN: "{{ secrets.DISCORD_TOKEN }}"
          HUE_APP_NAME: "{{ vars.HUE_APP_NAME }}"
          HUE_CLIENT_ID: "{{ vars.HUE_CLIENT_ID }}"
          HUE_CLIENT_SECRET: "{{ secrets.HUE_CLIENT_SECRET }}"
        run: |
          ansible-playbook custom-stream-overlay.yml

      - name: Cleanup Sensitive Files
        if: always()
        run: |
          rm -f ~/.ssh/id_rsa
